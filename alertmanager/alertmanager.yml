global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 6h
  receiver: 'null'
  routes:
    - matchers:
        - category = "integration"
      receiver: 'null'
      group_wait: 30s
      group_interval: 1m
      repeat_interval: 1h
    - matchers:
        - severity = "critical"
      receiver: 'null'
      repeat_interval: 1h
    - matchers:
        - severity = "warning"
      receiver: 'null'
      repeat_interval: 6h

receivers:
  - name: 'null'

inhibit_rules:
  - source_matchers:
      - severity = 'critical'
    target_matchers:
      - severity = 'warning'
    equal: ['alertname']
  - source_matchers:
      - alertname = "ServiceDown"
    target_matchers:
      - severity = "warning"
