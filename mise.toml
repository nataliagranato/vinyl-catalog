[tools]
go = "1.22"

[tasks.dev]
description = "Run app"
run = "go run ./cmd/api/main.go"

[tasks.build]
description = "Build binary"
run = "go build -o bin/vinyl-catalog ./cmd/api/main.go"

[tasks.test]
description = "Run all tests"
run = "go test ./... -v -cover"

[tasks.swag]
description = "Generate Swagger docs"
run = "swag init -g cmd/api/main.go -o docs/swagger"

[tasks.coverage]
description = "Generate HTML coverage report"
run = "go test ./... -coverprofile=coverage.out && go tool cover -html=coverage.out -o coverage.html"

[tasks.lint]
description = "Run linter"
run = "golangci-lint run ./..."

[tasks."docker:up"]
description = "Start all services"
run = "docker compose up -d --build"

[tasks."docker:down"]
description = "Stop all services"
run = "docker compose down"

[tasks."docker:logs"]
description = "Follow app logs"
run = "docker compose logs -f app"
